<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearView — Deep Stock Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#f7f8fa;--surface:#fff;--surface2:#f2f4f7;--surface3:#eaecf1;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);
  --text:#111318;--text2:#5a6070;--text3:#9aa0b0;
  --accent:#185FA5;--accent-dim:rgba(24,95,165,0.1);
  --green:#3B6D11;--green-dim:rgba(59,109,17,0.1);--green-bg:#EAF3DE;--green-bdr:#C0DD97;
  --red:#A32D2D;--red-dim:rgba(163,45,45,0.1);--red-bg:#FCEBEB;--red-bdr:#F7C1C1;
  --amber:#BA7517;--amber-dim:rgba(186,117,23,0.1);--amber-bg:#FAEEDA;--amber-bdr:#FAC775;
  --teal:#0F6E56;--teal-dim:rgba(15,110,86,0.1);--teal-bg:#E1F5EE;
  --radius:12px;--radius-sm:8px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --shadow:0 1px 4px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:var(--font);font-size:14px;background:var(--bg);color:var(--text);line-height:1.6;}
button{font-family:var(--font);cursor:pointer;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.body-wrap{flex:1;display:flex;overflow:hidden;}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:17px;font-weight:600;letter-spacing:-.4px;}.logo em{font-style:normal;color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:16px;}
.mkt-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.mkt-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
.mkt-dot.open{background:var(--green);box-shadow:0 0 0 3px var(--green-bg);animation:pulse 2s infinite;}
.mkt-dot.pre,.mkt-dot.after{background:var(--amber);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.mode-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:24px;padding:3px;}
.mode-btn{padding:5px 16px;border-radius:20px;font-size:12px;font-weight:500;border:none;background:transparent;color:var(--text2);transition:all .2s;}
.mode-btn.active{background:var(--surface);color:var(--text);border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.mode-btn.active.explain{color:var(--teal);}
.key-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);font-size:12px;color:var(--text2);}
.key-btn:hover{border-color:var(--accent);color:var(--accent);}

/* SETUP */
.setup-bar{background:rgba(24,95,165,0.06);border-bottom:1px solid rgba(24,95,165,.15);padding:10px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.setup-bar.hidden{display:none;}
.setup-lbl{font-size:12px;color:var(--accent);font-weight:500;}
.setup-input{height:32px;padding:0 10px;border:1px solid rgba(24,95,165,.25);border-radius:var(--radius-sm);font-size:12px;font-family:var(--mono);background:var(--surface);color:var(--text);outline:none;min-width:180px;max-width:240px;flex:1;}
.setup-input:focus{border-color:var(--accent);}
.setup-save{height:32px;padding:0 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:500;}
.setup-ok{font-size:12px;color:var(--green);font-weight:500;display:flex;align-items:center;gap:4px;}
.setup-change{background:none;border:none;font-size:12px;color:var(--text3);text-decoration:underline;cursor:pointer;}

/* SEARCH SCREEN */
.search-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
.search-screen.hidden{display:none;}
.ss-eyebrow{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:18px;}
.ss-heading{font-size:32px;font-weight:500;color:var(--text);text-align:center;letter-spacing:-.8px;line-height:1.25;margin-bottom:10px;}
.ss-sub{font-size:15px;color:var(--text2);text-align:center;max-width:440px;line-height:1.7;margin-bottom:36px;}
.ss-wrap{width:100%;max-width:500px;margin-bottom:20px;}
.ss-box{display:flex;align-items:center;gap:12px;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);transition:border-color .2s;}
.ss-box:focus-within{border-color:var(--accent);}
.ss-box i{font-size:16px;color:var(--text3);}
.ss-box input{flex:1;border:none;outline:none;font-size:15px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;background:transparent;color:var(--text);}
.ss-box input::placeholder{text-transform:none;font-family:var(--font);letter-spacing:0;font-size:14px;color:var(--text3);}
.ss-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 22px;font-size:13px;font-weight:500;white-space:nowrap;}
.quick-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;}
.quick-label{font-size:12px;color:var(--text3);}
.quick-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-family:var(--mono);font-weight:500;border:1px solid var(--border2);color:var(--text2);background:var(--surface);}
.quick-btn:hover{border-color:var(--accent);color:var(--accent);}

/* DASHBOARD */
.dashboard{flex:1;display:none;overflow:hidden;}
.dashboard.visible{display:flex;}

/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 14px;gap:4px;overflow-y:auto;}
.sb-search{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;cursor:pointer;margin-bottom:14px;}
.sb-search:hover{border-color:var(--accent);}
.sb-search i,.sb-search span{font-size:13px;color:var(--text3);}
.sb-lbl{font-size:10px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);padding:2px 6px;margin-bottom:4px;}
.stock-item{display:flex;align-items:center;justify-content:space-between;padding:10px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:background .12s;}
.stock-item:hover:not(.active){background:var(--surface2);}
.stock-item.active{background:var(--surface2);}
.si-left{display:flex;align-items:center;gap:10px;}
.si-bar{width:3px;height:32px;border-radius:2px;background:var(--text3);}
.si-bar.BUY,.si-bar.CALL{background:var(--green);}
.si-bar.HOLD{background:var(--amber);}
.si-bar.SHORT,.si-bar.SELL,.si-bar.PUT{background:var(--red);}
.si-tk{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--text);}
.si-co{font-size:11px;color:var(--text3);margin-top:1px;}
.si-rm{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;padding:2px 4px;}
.si-rm:hover{color:var(--red);}

/* MAIN PANEL */
.main-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

/* STOCK HEADER */
.stock-header{background:var(--surface);border-bottom:1px solid var(--border);padding:22px 28px 0;flex-shrink:0;display:none;}
.sh-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.sh-company{font-size:12px;color:var(--text3);margin-bottom:4px;}
.sh-ticker{font-size:30px;font-weight:600;font-family:var(--mono);color:var(--text);letter-spacing:-1px;line-height:1;}
.sh-price{font-size:30px;font-weight:600;font-family:var(--mono);color:var(--text);letter-spacing:-1px;line-height:1;text-align:right;}
.sh-range{font-size:11px;color:var(--text3);margin-top:5px;text-align:right;}
.sig-strip{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.sig-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:var(--radius);font-size:14px;font-weight:600;flex-shrink:0;border:1px solid;}
.sb-BUY{background:var(--green-bg);color:var(--green);border-color:var(--green-bdr);}
.sb-HOLD{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bdr);}
.sb-SHORT,.sb-SELL,.sb-PUT{background:var(--red-bg);color:var(--red);border-color:var(--red-bdr);}
.sb-CALL{background:var(--teal-bg);color:var(--teal);border-color:var(--teal-bdr);}
.sig-reason{font-size:13px;color:var(--text2);line-height:1.6;}
.tabs{display:flex;border-top:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{padding:12px 20px;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:var(--font);transition:all .15s;margin-bottom:-1px;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

/* CONTENT AREA */
.content-area{flex:1;overflow-y:auto;padding:24px 28px;}

/* LOADING / ERROR */
.loading-wrap{padding:60px 0;text-align:center;}
.spin{width:36px;height:36px;border-radius:50%;border:2.5px solid var(--surface3);border-top-color:var(--accent);animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-step{font-size:14px;color:var(--text2);margin-bottom:6px;}
.loading-note{font-size:12px;color:var(--text3);}
.error-wrap{padding:60px 0;text-align:center;}
.retry-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 22px;font-size:13px;font-weight:500;}

/* ── TAB CONTENT STYLES ── same structure as the working version */
.section-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:20px;}
.metric-card{background:var(--surface);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid var(--border);}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:4px;}
.metric-value{font-size:18px;font-weight:600;font-family:var(--mono);color:var(--text);}
.metric-sub{font-size:11px;margin-top:3px;}
.pos{color:var(--green);}.neg{color:var(--red);}.neu{color:var(--text3);}
.ratio-item{padding:14px 0;border-bottom:1px solid var(--border);}
.ratio-item:last-child{border-bottom:none;}
.ratio-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.ratio-name{font-size:13px;font-weight:500;color:var(--text);}
.ratio-val{font-size:14px;font-weight:600;font-family:var(--mono);}
.ratio-explain{font-size:13px;color:var(--text2);line-height:1.65;}
.verdict-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;margin-top:6px;letter-spacing:.04em;}
.vt-warn{background:var(--red-dim);color:var(--red);}
.vt-ok{background:var(--green-dim);color:var(--green);}
.vt-neu{background:var(--surface3);color:var(--text3);}
.vt-watch{background:var(--amber-dim);color:var(--amber);}
.contract-item{padding:14px 0;border-bottom:1px solid var(--border);}
.contract-item:last-child{border-bottom:none;}
.contract-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.contract-title{font-size:13px;font-weight:500;color:var(--text);}
.status-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:.04em;}
.st-confirmed{background:var(--green-dim);color:var(--green);}
.st-unconfirmed{background:var(--amber-dim);color:var(--amber);}
.st-risk{background:var(--red-dim);color:var(--red);}
.contract-body{font-size:13px;color:var(--text2);line-height:1.65;}
.macro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.macro-card{background:var(--surface);border-radius:var(--radius-sm);padding:14px 16px;border:1px solid var(--border);}
.macro-label{font-size:11px;color:var(--text3);margin-bottom:3px;}
.macro-val{font-size:15px;font-weight:600;font-family:var(--mono);color:var(--text);margin-bottom:6px;}
.macro-impact{font-size:13px;color:var(--text2);line-height:1.65;}
.bb-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;}
.bb-col{background:var(--surface);border-radius:var(--radius-sm);padding:14px;border:1px solid var(--border);}
.bb-col.bull{border-color:var(--green-bdr);}
.bb-col.bear{border-color:var(--red-bdr);}
.bb-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.bull .bb-title{color:var(--green);}.bear .bb-title{color:var(--red);}
.bb-point{font-size:12px;color:var(--text2);padding:5px 0 5px 14px;position:relative;border-bottom:1px solid var(--border);line-height:1.5;}
.bb-point:last-child{border-bottom:none;}
.bb-point::before{content:'';position:absolute;left:0;top:12px;width:5px;height:5px;border-radius:50%;}
.bull .bb-point::before{background:var(--green);}
.bear .bb-point::before{background:var(--red);}
.verdict-box{background:var(--surface);border-radius:var(--radius);padding:16px 18px;border:1px solid var(--border);margin-top:4px;}
.verdict-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;}
.verdict-body{font-size:13px;color:var(--text2);line-height:1.7;}
.disclaimer{font-size:11px;color:var(--text3);margin-top:20px;padding-top:12px;border-top:1px solid var(--border);}

/* ── RICH RATIO STYLES ── */
.r-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.r-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;}
.r-header-left{display:flex;align-items:center;gap:12px;}
.r-icon{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.r-name{font-size:13px;font-weight:500;color:var(--text);}
.r-peer{font-size:11px;color:var(--text3);margin-top:1px;}
.r-right{display:flex;align-items:center;gap:10px;}
.r-value{font-size:20px;font-weight:600;font-family:var(--mono);}
.rv-warn{color:var(--red);}.rv-ok{color:var(--green);}.rv-neu{color:var(--text2);}.rv-watch{color:var(--amber);}
.r-vtag{display:inline-block;font-size:10px;font-weight:600;padding:3px 9px;border-radius:4px;}
.rvt-warn{background:var(--red-bg);color:var(--red);}
.rvt-ok{background:var(--green-bg);color:var(--green);}
.rvt-neu{background:var(--surface2);color:var(--text3);}
.rvt-watch{background:var(--amber-bg);color:var(--amber);}
.r-body{padding:0 16px 14px;border-top:1px solid var(--border);}
.r-bar-wrap{margin-top:10px;}
.r-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px;}
.r-bar-track{height:4px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative;}
.r-bar-fill{height:100%;border-radius:4px;}
.r-bar-marker{position:absolute;top:-3px;width:2px;height:10px;background:var(--text);border-radius:1px;}
.r-explain{font-size:13px;color:var(--text2);line-height:1.7;padding-top:10px;}

/* ── RICH MACRO STYLES ── */
.macro-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;display:flex;align-items:flex-start;gap:14px;}
.macro-summary-icon{width:36px;height:36px;border-radius:var(--radius-sm);background:rgba(24,95,165,0.08);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.macro-summary-text{font-size:13px;color:var(--text2);line-height:1.7;}
.macro-summary-text strong{color:var(--text);font-weight:500;}
.macro-grid-outer{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.m-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.m-card-top{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.m-card-left{display:flex;align-items:flex-start;gap:10px;}
.m-icon{width:30px;height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.m-factor{font-size:13px;font-weight:500;color:var(--text);}
.m-reading{font-size:11px;color:var(--text3);margin-top:1px;}
.m-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.mb-tail{background:var(--green-bg);color:var(--green);}
.mb-head{background:var(--red-bg);color:var(--red);}
.mb-mix{background:var(--amber-bg);color:var(--amber);}
.mb-neu{background:var(--surface2);color:var(--text2);}
.m-card-body{padding:12px 16px 14px;}
.m-explain{font-size:13px;color:var(--text2);line-height:1.7;}
.m-arrow{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;font-weight:500;}
.m-arrow.up{color:var(--green);}.m-arrow.dn{color:var(--red);}.m-arrow.neu{color:var(--text3);}
.net-impact{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.net-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.net-label{font-size:13px;font-weight:500;color:var(--text);}
.net-score{font-size:13px;font-weight:500;}
.score-track{height:6px;background:var(--surface2);border-radius:6px;overflow:hidden;}
.score-fill{height:100%;border-radius:6px;}
.score-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px;}

/* ── VERDICT STYLES ── */
.verdict-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;}
.vh-top{display:flex;align-items:flex-start;gap:20px;margin-bottom:20px;}
.vh-badge{width:80px;height:80px;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0;border:1px solid;}
.vh-badge i{font-size:24px;}
.vh-badge span{font-size:12px;font-weight:600;letter-spacing:.04em;}
.vh-BUY{background:var(--green-bg);color:var(--green);border-color:var(--green-bdr);}
.vh-HOLD{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bdr);}
.vh-SHORT,.vh-SELL,.vh-PUT{background:var(--red-bg);color:var(--red);border-color:var(--red-bdr);}
.vh-CALL{background:var(--teal-bg);color:var(--teal);border-color:var(--teal-bdr);}
.vh-text{flex:1;font-size:14px;color:var(--text2);line-height:1.8;}
.conv-wrap{margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.conv-label{font-size:12px;color:var(--text3);flex-shrink:0;}
.conv-track{flex:1;height:5px;background:var(--surface2);border-radius:5px;overflow:hidden;min-width:60px;}
.conv-fill{height:100%;border-radius:5px;}
.conv-val{font-size:12px;font-weight:500;flex-shrink:0;}
.conv-note{font-size:11px;color:var(--text3);}
.scorecard{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.sc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 18px 16px;}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sc-icon{width:30px;height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:14px;}
.sc-rating{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;}
.sc-dot{width:7px;height:7px;border-radius:50%;}
.sc-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px;}

<body>
<div class="app">

<nav class="nav">
  <div class="logo">Clear<em>View</em></div>
  <div class="nav-right">
    <div class="mkt-status"><div class="mkt-dot" id="mktDot"></div><span id="mktLbl">Checking...</span></div>
    <div class="mode-toggle">
      <button class="mode-btn explain active" id="explainBtn" onclick="setMode('explain')">Explain</button>
      <button class="mode-btn" id="analystBtn" onclick="setMode('analyst')">Analyst</button>
    </div>
    <button class="key-btn" onclick="toggleSetup()"><i class="fa fa-key"></i> API Key</button>
  </div>
</nav>

<div class="setup-bar hidden" id="setupBar">
  <span class="setup-lbl"><i class="fa fa-key" style="margin-right:4px"></i>Anthropic API key:</span>
  <input class="setup-input" type="password" id="antInput" placeholder="sk-ant-..." />
  <button class="setup-save" onclick="saveKey()">Save</button>
  <span class="setup-ok hidden" id="keyOk"><i class="fa fa-circle-check"></i> Connected</span>
  <button class="setup-change hidden" id="keyChange" onclick="resetKey()">Change</button>
</div>

<div class="body-wrap">
  <!-- SEARCH SCREEN -->
  <div class="search-screen" id="searchScreen">
    <div class="ss-eyebrow">Deep stock analysis</div>
    <div class="ss-heading">Search any stock.<br>Get the full picture.</div>
    <div class="ss-sub">Earnings, ratios, contracts, macro — with full narrative explaining what every number means for this specific company right now.</div>
    <div class="ss-wrap">
      <div class="ss-box">
        <i class="fa fa-search"></i>
        <input type="text" id="searchInput" placeholder="Enter a ticker — AAPL, MSFT, NVDA..." maxlength="10"/>
        <button class="ss-btn" onclick="addStock()">Analyse</button>
      </div>
    </div>
    <div class="quick-row">
      <span class="quick-label">Try:</span>
      <button class="quick-btn" onclick="quickAdd('AAPL')">AAPL</button>
      <button class="quick-btn" onclick="quickAdd('MSFT')">MSFT</button>
      <button class="quick-btn" onclick="quickAdd('NVDA')">NVDA</button>
      <button class="quick-btn" onclick="quickAdd('TSLA')">TSLA</button>
      <button class="quick-btn" onclick="quickAdd('INTC')">INTC</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="sidebar">
      <div class="sb-search" onclick="backToSearch()"><i class="fa fa-search"></i><span>Add ticker...</span></div>
      <div class="sb-lbl">Watchlist</div>
      <div id="sidebarList"></div>
    </div>
    <div class="main-panel">
      <div class="stock-header" id="stockHeader">
        <div class="sh-top">
          <div><div class="sh-company" id="hdrCompany"></div><div class="sh-ticker" id="hdrTicker"></div></div>
          <div><div class="sh-price" id="hdrPrice"></div><div class="sh-range" id="hdrRange"></div></div>
        </div>
        <div class="sig-strip"><div class="sig-badge" id="hdrSig"></div><div class="sig-reason" id="hdrReason"></div></div>
        <div class="tabs" id="tabBar"></div>
      </div>
      <div class="content-area" id="contentArea"></div>
    </div>
  </div>
</div>

</div>
<script>
// ═══ EXACT SAME ENGINE FROM THE WORKING VERSION ═══
const API_URL = 'https://api.anthropic.com/v1/messages';
let antKey = localStorage.getItem('cv_ant') || '';
let currentMode = 'explain';
let stocks = {};
let activeStock = null;
const TABS = [
  {id:'overview',label:'Overview'},{id:'earnings',label:'Earnings'},{id:'ratios',label:'Ratios'},
  {id:'contracts',label:'Deals & Contracts'},{id:'macro',label:'Macro'},{id:'verdict',label:'Verdict'}
];
const STEPS = ['Searching latest news and filings...','Pulling earnings and ratio data...','Analysing macro environment...','Building your signal...'];

// ── INIT ──
window.addEventListener('load',()=>{
  updateMarket(); setInterval(updateMarket,60000);
  if(antKey) showKeyConnected();
  document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')addStock();});
});

// ── KEY MANAGEMENT ──
function toggleSetup(){document.getElementById('setupBar').classList.toggle('hidden');}
function saveKey(){
  const k=document.getElementById('antInput').value.trim();
  if(k){antKey=k;localStorage.setItem('cv_ant',k);showKeyConnected();}
}
function showKeyConnected(){
  document.getElementById('antInput').style.display='none';
  document.querySelector('.setup-save').style.display='none';
  document.getElementById('keyOk').classList.remove('hidden');
  document.getElementById('keyChange').classList.remove('hidden');
}
function resetKey(){
  antKey='';localStorage.removeItem('cv_ant');
  document.getElementById('antInput').value='';
  document.getElementById('antInput').style.display='';
  document.querySelector('.setup-save').style.display='';
  document.getElementById('keyOk').classList.add('hidden');
  document.getElementById('keyChange').classList.add('hidden');
}

// ── MARKET STATUS ──
function getSession(){
  const et=new Date(Date.now()+new Date().getTimezoneOffset()*60000-5*3600000);
  const d=et.getDay(),h=et.getHours()+et.getMinutes()/60;
  if(d===0||d===6)return'closed';if(h>=4&&h<9.5)return'pre';if(h>=9.5&&h<16)return'open';if(h>=16&&h<20)return'after';return'closed';
}
function updateMarket(){
  const s=getSession();
  document.getElementById('mktDot').className='mkt-dot '+s;
  document.getElementById('mktLbl').textContent={open:'Market open',pre:'Pre-market',after:'After-hours',closed:'Market closed'}[s]||'Closed';
}

// ── MODE ──
function setMode(mode){
  currentMode=mode;
  document.getElementById('explainBtn').classList.toggle('active',mode==='explain');
  document.getElementById('analystBtn').classList.toggle('active',mode==='analyst');
  document.getElementById('explainBtn').classList.toggle('explain',mode==='explain');
  if(activeStock&&stocks[activeStock]?.status==='done') renderAnalysis(activeStock);
}

// ── STOCK MANAGEMENT ──
function quickAdd(t){document.getElementById('searchInput').value=t;addStock();}
function addStock(){
  const inp=document.getElementById('searchInput');
  const ticker=inp.value.trim().toUpperCase().replace(/[^A-Z0-9.]/g,'');
  if(!ticker)return;
  inp.value='';
  if(stocks[ticker]){setActive(ticker);return;}
  if(Object.keys(stocks).length>=10){alert('Max 10 stocks.');return;}
  stocks[ticker]={status:'loading',data:null,activeTab:'overview'};
  activeStock=ticker;
  showDashboard();
  updateSidebar();
  showLoading(ticker);
  fetchAnalysis(ticker);
}
function setActive(ticker){
  activeStock=ticker;
  updateSidebar();
  if(stocks[ticker].status==='done')renderAnalysis(ticker);
  else if(stocks[ticker].status==='loading')showLoading(ticker);
  else showError(ticker);
}
function removeStock(ticker){
  if(stocks[ticker]?._loadInterval)clearInterval(stocks[ticker]._loadInterval);
  delete stocks[ticker];
  const rest=Object.keys(stocks);
  if(!rest.length){activeStock=null;backToSearch();return;}
  activeStock=rest[rest.length-1];
  updateSidebar();setActive(activeStock);
}
function backToSearch(){
  document.getElementById('searchScreen').classList.remove('hidden');
  document.getElementById('dashboard').classList.remove('visible');
}
function showDashboard(){
  document.getElementById('searchScreen').classList.add('hidden');
  document.getElementById('dashboard').classList.add('visible');
}

// ── SIDEBAR ──
function updateSidebar(){
  document.getElementById('sidebarList').innerHTML=Object.keys(stocks).map(t=>{
    const s=stocks[t];

// ── JSON REPAIR (exact same from working version) ──
function repairJSON(raw){
  const start=raw.indexOf('{');if(start===-1)return null;
  let str=raw.slice(start);
  try{return JSON.parse(str);}catch(e){}
  let depth=0,inString=false,escape=false,lastValidPos=0;
  for(let i=0;i<str.length;i++){
    const ch=str[i];
    if(escape){escape=false;continue;}if(ch==='\\'&&inString){escape=true;continue;}
    if(ch==='"'){inString=!inString;continue;}if(inString)continue;
    if(ch==='{'||ch==='[')depth++;
    if(ch==='}'||ch===']'){depth--;if(depth===0)lastValidPos=i;}
  }
  if(depth>0){
    let trimmed=str.replace(/,\s*$/,'').replace(/:\s*"[^"]*$/,': ""').replace(/:\s*\[$/,': []').replace(/,\s*\{[^}]*$/,'');
    const closes=[];let d2=0;let inS2=false;let esc2=false;
    for(let i=0;i<trimmed.length;i++){const ch=trimmed[i];if(esc2){esc2=false;continue;}if(ch==='\\'&&inS2){esc2=true;continue;}if(ch==='"'){inS2=!inS2;continue;}if(inS2)continue;if(ch==='{'){d2++;closes.push('}');}if(ch==='['){d2++;closes.push(']');}if(ch==='}'||ch===']'){d2--;closes.pop();}}
    trimmed=trimmed+closes.reverse().join('');
    try{return JSON.parse(trimmed);}catch(e){}
  }
  if(lastValidPos>0){try{return JSON.parse(str.slice(0,lastValidPos+1));}catch(e){}}
  return null;
}

// ── FETCH ANALYSIS (same logic, updated headers) ──
async function fetchAnalysis(ticker){
  const prompt=buildPrompt(ticker);
  try{
    const res=await fetch(API_URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
        ...(antKey?{'x-api-key':antKey}:{})
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:16000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:prompt}]
      })
    });
    const json=await res.json();
    if(json.error){
      if(json.error.message?.includes('rate limit')){
        // Wait 60s and retry
        if(stocks[ticker])stocks[ticker]._loadInterval=setTimeout(()=>{
          const el=document.getElementById('loadStep');
          if(el)el.textContent='Rate limited — retrying in a moment...';
        },1000);
        await new Promise(r=>setTimeout(r,62000));
        return fetchAnalysis(ticker);
      }
      throw new Error(json.error.message);
    }
    const textBlock=json.content?.find(b=>b.type==='text');
    const raw=textBlock?.text||'';
    if(!raw)throw new Error('Empty response from API');
    const data=repairJSON(raw);
    if(!data||!data.ticker)throw new Error('Could not parse analysis data. Try again.');
    if(stocks[ticker]._loadInterval)clearInterval(stocks[ticker]._loadInterval);
    stocks[ticker]={status:'done',data,activeTab:'overview'};
    updateSidebar();
    if(activeStock===ticker)renderAnalysis(ticker);
  }catch(e){
    if(stocks[ticker]?._loadInterval)clearInterval(stocks[ticker]._loadInterval);
    stocks[ticker]={status:'error',error:e.message};
    updateSidebar();
    if(activeStock===ticker)showError(ticker);
  }
}

          </div>
          <div class="r-right">
            <div class="r-value ${rvMap[r.verdict]||'rv-neu'}">${r.value}</div>
            <div class="r-vtag ${vtMap[r.verdict]||'rvt-neu'}">${r.verdictLabel||r.verdict?.charAt(0).toUpperCase()+r.verdict?.slice(1)||'Neutral'}</div>
          </div>
        </div>
        <div class="r-body">
          ${hasBar?`<div class="r-bar-wrap"><div class="r-bar-labels"><span>${r.barLeft}</span><span>${r.barMid||''}</span><span>${r.barRight}</span></div><div class="r-bar-track"><div class="r-bar-fill" style="width:${r.barPct}%;background:${r.barColor||'var(--accent)'}"></div></div></div>`:''}
          <div class="r-explain">${explain}</div>
        </div>
      </div>`;
    }).join('')}`;
}

function renderContracts(d,mode){
  const contracts=d.contracts||[];const mgmt=d.management||[];
  const isE=mode==='explain';
  const spMap={confirmed:'sp-confirmed',unconfirmed:'sp-unconfirmed',risk:'sp-risk'};
  const spLabel={confirmed:'Confirmed',unconfirmed:'Unconfirmed',risk:'Risk'};
  const chipMap={revenue:'ic-revenue',strategic:'ic-strategic',risk:'ic-risk',neutral:'ic-neutral'};
  const avMap={positive:'av-positive',watch:'av-watch',concern:'av-concern'};
  const mtMap={positive:'mt-positive',watch:'mt-watch',concern:'mt-concern'};
  return `<div class="section-label">${isE?'Deals & contracts — plain English':'Deals & contracts — last 12 months'}</div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="filterDeals(event,'all')">All</button>
      <button class="filter-btn f-confirmed" onclick="filterDeals(event,'confirmed')"><i class="fa fa-circle-check" style="font-size:11px"></i> Confirmed</button>
      <button class="filter-btn f-unconfirmed" onclick="filterDeals(event,'unconfirmed')"><i class="fa fa-clock" style="font-size:11px"></i> Unconfirmed</button>
      <button class="filter-btn f-risk" onclick="filterDeals(event,'risk')"><i class="fa fa-triangle-exclamation" style="font-size:11px"></i> Risk</button>
    </div>
    ${contracts.map(c=>{
      const body=isE?c.beginnerBody:c.analystBody;
      const sub=isE?c.beginnerSubtitle:c.analystSubtitle;
      return `<div class="deal-card ${c.status||''}" data-status="${c.status||''}">
        <div class="deal-top">
          <div class="deal-top-left">
            <div class="partner-logo">${c.logo||'?'}</div>
            <div>
              <div class="deal-title">${c.title}</div>
              <div class="deal-subtitle">${sub||''} · ${c.date||''}</div>
            </div>
          </div>
          <div class="deal-right">
            <div class="status-pill ${spMap[c.status]||'sp-unconfirmed'}">${spLabel[c.status]||c.status||''}</div>
          </div>
        </div>
        <div class="deal-divider"></div>
        <div class="deal-body">
          <div class="deal-explain">${body}</div>
          <div class="deal-chips">${(c.chips||[]).map(ch=>`<div class="impact-chip ${chipMap[ch.type]||'ic-neutral'}"><i class="fa fa-circle" style="font-size:6px"></i> ${ch.label}</div>`).join('')}</div>
        </div>
      </div>`;
    }).join('')}
    ${mgmt.length?`<div class="section-label" style="margin-top:20px">Management</div>
    ${mgmt.map(m=>{
      const body=isE?m.beginnerBody:m.analystBody;
      return `<div class="mgmt-card">
        <div class="mgmt-avatar ${avMap[m.signal]||'av-watch'}">${m.initials||'?'}</div>
        <div style="flex:1">
          <div class="mgmt-name">${m.name}</div>
          <div class="mgmt-role">${m.role||''}</div>
          <div class="mgmt-explain">${body}</div>
          <div class="mgmt-tag ${mtMap[m.signal]||'mt-watch'}"><i class="fa fa-${m.signal==='positive'?'circle-check':'clock'}" style="font-size:10px"></i> ${m.tagLabel||m.signal||''}</div>
        </div>
      </div>`;
    }).join('')}`:''}`;
}

function renderMacro(d,mode){
  const macro=d.macro||[];const isE=mode==='explain';
  const ms=d.macroSummary||{};const ni=d.macroNetImpact||{};
  const mbMap={tail:'mb-tail',head:'mb-head',mix:'mb-mix',neu:'mb-neu'};
  const arrowIc={up:'fa-arrow-up',dn:'fa-arrow-down',neu:'fa-minus'};
  const summaryText=isE?(ms.beginnerText||''):(ms.analystText||'');
  return `
    <div class="macro-summary">
      <div class="macro-summary-icon"><i class="fa fa-globe"></i></div>
      <div class="macro-summary-text">${summaryText?`<strong>${isE?'What does the world around this stock look like?':'Net macro verdict:'}</strong> ${summaryText}`:''}</div>
    </div>
    <div class="section-label">Macro factors & impact on ${d.ticker||''}</div>
    <div class="macro-grid-outer">${macro.map(m=>{
      const impact=isE?m.beginnerImpact:m.analystImpact;
      return `<div class="m-card">
        <div class="m-card-top">
          <div class="m-card-left">
            <div class="m-icon" style="background:${m.iconBg||'var(--surface2)'};color:${m.iconColor||'var(--text2)'}"><i class="fa ${m.icon||'fa-circle'}"></i></div>
            <div><div class="m-factor">${m.factor}</div><div class="m-reading">${m.value}</div></div>
          </div>
          <div class="m-badge ${mbMap[m.impact]||'mb-neu'}">${m.impactLabel||m.impact||'Neutral'}</div>
        </div>
        <div class="m-card-body">
          <div class="m-explain">${impact}</div>
          <div class="m-arrow ${m.arrowDir||'neu'}"><i class="fa ${arrowIc[m.arrowDir]||'fa-minus'}" style="font-size:12px"></i> ${m.arrowLabel||''}</div>
        </div>
      </div>`;
    }).join('')}</div>
    <div class="net-impact">
      <div class="net-row">
        <div class="net-label">Overall macro backdrop for ${d.ticker||''}</div>
        <div class="net-score" style="color:${ni.color||'var(--amber)'}">${ni.label||'Mixed'}</div>
      </div>
      <div class="score-track"><div class="score-fill" style="width:${ni.barPct||45}%;background:${ni.barColor||'var(--amber)'}"></div></div>
      <div class="score-labels"><span>Strong headwind</span><span>Neutral</span><span>Strong tailwind</span></div>
    </div>`;
}

function renderVerdict(d,mode){
  const v=d.verdict||{};const isE=mode==='explain';const sig=d.signal||'HOLD';
  const vText=isE?v.beginnerVerdict:v.analystVerdict;
  const sigIc={BUY:'fa-arrow-trend-up',SELL:'fa-arrow-trend-down',SHORT:'fa-arrow-trend-down',PUT:'fa-arrow-down',CALL:'fa-arrow-up',HOLD:'fa-minus'}[sig]||'fa-minus';
  const conv=v.conviction||'medium';
  const convPct={low:25,medium:52,high:82}[conv]||52;
  const convColor={low:'var(--red)',medium:'var(--amber)',high:'var(--green)'}[conv]||'var(--amber)';
  const rec=v.recommendation||{};
  const recText=isE?rec.beginnerText:rec.analystText;
  return `
    <div class="section-label">${isE?'Verdict — plain English':'Verdict — analyst view'}</div>
    <div class="verdict-hero">
      <div class="vh-top">
        <div class="vh-badge vh-${sig}"><i class="fa ${sigIc}"></i><span>${sig}</span></div>
        <div class="vh-text">${vText||'—'}</div>
      </div>
      <div class="conv-wrap">
        <span class="conv-label">Analysis conviction</span>
        <div class="conv-track"><div class="conv-fill" style="width:${convPct}%;background:${convColor}"></div></div>
        <span class="conv-val" style="color:${convColor}">${conv.charAt(0).toUpperCase()+conv.slice(1)}</span>
        <span class="conv-note">— ${v.convictionNote||''}</span>
      </div>
    </div>

    <div class="section-label">Signal scorecard</div>
    <div class="scorecard">${(v.scorecard||[]).map(sc=>`
      <div class="sc-card">
        <div class="sc-top">
          <div class="sc-icon" style="background:${sc.iconBg||'var(--surface2)'};color:${sc.iconColor||'var(--text2)'}"><i class="fa ${sc.icon||'fa-circle'}"></i></div>
          <div class="sc-rating"><div class="sc-dot" style="background:${sc.ratingColor||'var(--text3)'}"></div><span style="color:${sc.ratingColor||'var(--text3)'}">${sc.rating||'—'}</span></div>
        </div>
        <div class="sc-name">${sc.name||''}</div>
        <div class="sc-desc">${isE?(sc.beginnerDesc||''):(sc.analystDesc||'')}</div>
      </div>`).join('')}
    </div>

    <div class="section-label">Bull vs bear</div>
    <div class="bb-grid" style="margin-bottom:20px">
      <div class="bb-col bull"><div class="bb-title">Bull case</div>${(d.bullCase||[]).map(p=>`<div class="bb-point"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-right:10px;flex-shrink:0;margin-top:6px"></span>${p}</div>`).join('')}</div>
      <div class="bb-col bear"><div class="bb-title">Bear case</div>${(d.bearCase||[]).map(p=>`<div class="bb-point"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--red);margin-right:10px;flex-shrink:0;margin-top:6px"></span>${p}</div>`).join('')}</div>
    </div>

    <div class="section-label">Upcoming catalysts</div>
    <div class="catalyst-card">${(v.catalysts||[]).map((c,i,arr)=>`
      <div class="cat-row">
        <div class="cat-date">${c.date||''}</div>
        <div class="cat-line"><div class="cat-dot" style="background:${c.dotColor||'var(--text3)'}"></div>${i<arr.length-1?'<div class="cat-connector"></div>':''}</div>
        <div class="cat-body">
          <div class="cat-title">${c.label||''}</div>
          <div class="cat-desc">${isE?(c.beginnerDesc||''):(c.analystDesc||'')}</div>
          <span class="cat-pill ${c.pillClass||'cp-neu'}">${c.pillLabel||''}</span>
        </div>
      </div>`).join('')}
    </div>

    <div class="section-label">Research recommendation</div>
    <div class="rec-card">
      <div class="rec-header">
        <div class="rec-icon"><i class="fa fa-file-lines"></i></div>
        <div>
          <div class="rec-title">${isE?'What the data suggests':'Based on this analysis'}</div>
          <div class="rec-subtitle">Data-driven research position · not personalised investment advice</div>
        </div>
      </div>
      <div class="rec-text">${recText||'—'}</div>
      <div class="rec-chips">${(rec.chips||[]).map(ch=>`<div class="rc ${ch.class||'rc-hold'}"><i class="fa fa-circle" style="font-size:6px"></i> ${ch.label||''}</div>`).join('')}</div>
      <div class="disclaimer-box"><p><strong>Research note:</strong> ClearView generates data-driven research recommendations based on publicly available financial information. This is not personalised investment advice and does not take into account your individual financial situation, risk tolerance, or investment objectives. Always consult a qualified financial adviser before making investment decisions.</p></div>
    </div>`;
}
function filterDeals(ev,status){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  ev.currentTarget.classList.add('on');
  document.querySelectorAll('.deal-card').forEach(c=>{
    c.style.display=(status==='all'||c.dataset.status===status)?'block':'none';
  });
}
</script>
</body>
</html>
